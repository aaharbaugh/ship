<svg width="2000" height="1260" viewBox="0 0 2000 1260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="paperGrid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#E7E0D2" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#312E2A" flood-opacity="0.10"/>
    </filter>
    <marker id="inkArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L8 5L1 9" stroke="#264653" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="warmArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L8 5L1 9" stroke="#B85C38" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 48px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #1F2933; }
      .subtitle { font: 500 20px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #5B6470; }
      .section { font: 700 18px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #284B63; letter-spacing: 0.08em; text-transform: uppercase; }
      .group { font: 700 15px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #5F6B5B; letter-spacing: 0.08em; text-transform: uppercase; }
      .nodeTitle { font: 700 21px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #24303A; }
      .nodeText { font: 500 15px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #53606C; }
      .pill { font: 700 13px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #284B63; letter-spacing: 0.06em; text-transform: uppercase; }
      .noteTitle { font: 700 18px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #24303A; }
      .noteText { font: 500 15px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #5B6470; }
      .tiny { font: 500 14px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #7A6F63; }
    </style>
  </defs>

  <rect width="2000" height="1260" fill="#F6F1E8"/>
  <rect width="2000" height="1260" fill="url(#paperGrid)" opacity="0.5"/>
  <rect x="60" y="60" width="1880" height="1140" rx="28" fill="#FBF8F2" stroke="#DCCFBD"/>

  <text x="96" y="112" class="title">FleetGraph Runtime And Observability Graph</text>
  <text x="96" y="150" class="subtitle">Current system shape: explicit node sequence, early context branch, decision branch, human review gate, and proof surfaces for test case to trace to result.</text>

  <text x="96" y="220" class="section">Graph Runtime</text>
  <rect x="96" y="248" width="1808" height="720" rx="24" fill="#FFFDF9" stroke="#D8CCBA"/>

  <rect x="120" y="276" width="250" height="664" rx="20" fill="#F7F2EA" stroke="#D8CCBA"/>
  <text x="142" y="306" class="group">Trigger</text>

  <rect x="144" y="356" width="202" height="96" rx="18" fill="#FFFDF9" stroke="#B8CAD3" filter="url(#softShadow)"/>
  <rect x="162" y="372" width="82" height="22" rx="11" fill="#E3EEF2"/>
  <text x="182" y="388" class="pill">Manual</text>
  <text x="162" y="420" class="nodeTitle">Prompt Ask</text>
  <text x="162" y="442" class="nodeText">On-demand document review.</text>

  <rect x="144" y="496" width="202" height="96" rx="18" fill="#FFFDF9" stroke="#B8CAD3" filter="url(#softShadow)"/>
  <text x="162" y="536" class="nodeTitle">Proactive Run</text>
  <text x="162" y="558" class="nodeText">Nightly or event trigger.</text>

  <rect x="144" y="636" width="202" height="122" rx="18" fill="#FFFDF9" stroke="#B8CAD3" filter="url(#softShadow)"/>
  <text x="162" y="676" class="nodeTitle">Load Trigger Context</text>
  <text x="162" y="698" class="nodeText">Normalize workspace,</text>
  <text x="162" y="720" class="nodeText">source, root doc,</text>
  <text x="162" y="742" class="nodeText">and mode.</text>

  <rect x="408" y="276" width="700" height="664" rx="20" fill="#F7F2EA" stroke="#D8CCBA"/>
  <text x="430" y="306" class="group">Context And Graph Build</text>

  <rect x="438" y="340" width="182" height="98" rx="18" fill="#FFFDF9" stroke="#C9C3B6" filter="url(#softShadow)"/>
  <text x="458" y="382" class="nodeTitle">Load Document</text>
  <text x="458" y="404" class="nodeText">Fetch the root document.</text>

  <rect x="690" y="340" width="182" height="98" rx="18" fill="#FFFDF9" stroke="#C9C3B6" filter="url(#softShadow)"/>
  <text x="706" y="382" class="nodeTitle">Load Associations</text>
  <text x="706" y="404" class="nodeText">Direct and reverse edges.</text>

  <rect x="454" y="500" width="200" height="116" rx="18" fill="#FFFDF9" stroke="#D5A98D" filter="url(#softShadow)"/>
  <rect x="474" y="516" width="120" height="22" rx="11" fill="#F1D6C7"/>
  <text x="500" y="532" class="pill">Branch A</text>
  <text x="474" y="568" class="nodeTitle">Resolve Anchor</text>
  <text x="474" y="590" class="nodeText">Leaf-ish docs climb</text>
  <text x="474" y="612" class="nodeText">up to project/program</text>

  <rect x="708" y="500" width="216" height="116" rx="18" fill="#FFFDF9" stroke="#D5A98D" filter="url(#softShadow)"/>
  <rect x="728" y="516" width="132" height="22" rx="11" fill="#F1D6C7"/>
  <text x="754" y="532" class="pill">Branch B</text>
  <text x="728" y="568" class="nodeTitle">Resolve Execution</text>
  <text x="728" y="590" class="nodeText">Projects/programs fan</text>
  <text x="728" y="612" class="nodeText">out into child work</text>

  <rect x="520" y="684" width="334" height="112" rx="18" fill="#FFFDF9" stroke="#C9C3B6" filter="url(#softShadow)"/>
  <text x="542" y="726" class="nodeTitle">Load Related Documents</text>
  <text x="542" y="748" class="nodeText">Fetch nearby docs after the early context branch.</text>
  <text x="542" y="770" class="nodeText">Branch choice changes fetch ordering and emphasis.</text>

  <rect x="578" y="830" width="218" height="96" rx="18" fill="#F5E8DF" stroke="#D5A98D" filter="url(#softShadow)"/>
  <rect x="598" y="846" width="118" height="22" rx="11" fill="#F1D6C7"/>
  <text x="622" y="862" class="pill">Executed Path</text>
  <text x="598" y="896" class="nodeTitle">Build Graph</text>
  <text x="598" y="918" class="nodeText">Snapshot nodes and edges.</text>

  <rect x="1146" y="276" width="308" height="664" rx="20" fill="#F7F2EA" stroke="#D8CCBA"/>
  <text x="1168" y="306" class="group">Scoring And Branching</text>

  <rect x="1176" y="356" width="154" height="96" rx="18" fill="#FFFDF9" stroke="#B8CAD3" filter="url(#softShadow)"/>
  <text x="1206" y="398" class="nodeTitle">Score Graph</text>
  <text x="1206" y="420" class="nodeText">Rules plus model.</text>

  <rect x="1298" y="524" width="136" height="96" rx="18" fill="#FFFDF9" stroke="#B8CAD3" filter="url(#softShadow)"/>
  <text x="1314" y="566" class="nodeTitle">Decide Action</text>
  <text x="1314" y="588" class="nodeText">Choose branch.</text>

  <rect x="1176" y="692" width="258" height="174" rx="18" fill="#FFFDF9" stroke="#D5A98D" filter="url(#softShadow)"/>
  <rect x="1196" y="710" width="108" height="22" rx="11" fill="#F1D6C7"/>
  <text x="1220" y="726" class="pill">Decision</text>
  <text x="1196" y="762" class="nodeTitle">Possible Outcomes</text>
  <text x="1196" y="788" class="nodeText">healthy</text>
  <text x="1196" y="812" class="nodeText">human_review_required</text>
  <text x="1196" y="836" class="nodeText">draft_report_recommended</text>

  <rect x="1492" y="276" width="388" height="664" rx="20" fill="#F7F2EA" stroke="#D8CCBA"/>
  <text x="1514" y="306" class="group">Human And Write Side</text>

  <rect x="1522" y="340" width="168" height="98" rx="18" fill="#FFFDF9" stroke="#C9C3B6" filter="url(#softShadow)"/>
  <text x="1548" y="382" class="nodeTitle">Human Review</text>
  <text x="1548" y="404" class="nodeText">Explicit decision gate.</text>

  <rect x="1720" y="306" width="136" height="78" rx="18" fill="#F2F7F2" stroke="#A8B8A8" filter="url(#softShadow)"/>
  <text x="1746" y="344" class="nodeTitle">Approve</text>
  <text x="1746" y="364" class="nodeText">Continue</text>

  <rect x="1720" y="420" width="136" height="78" rx="18" fill="#FBF3E5" stroke="#D9B57A" filter="url(#softShadow)"/>
  <text x="1746" y="458" class="nodeTitle">Snooze</text>
  <text x="1746" y="478" class="nodeText">Delay</text>

  <rect x="1720" y="534" width="136" height="78" rx="18" fill="#F4F1ED" stroke="#B8B0A5" filter="url(#softShadow)"/>
  <text x="1746" y="572" class="nodeTitle">Dismiss</text>
  <text x="1746" y="592" class="nodeText">Stop</text>

  <rect x="1522" y="654" width="170" height="98" rx="18" fill="#FFFDF9" stroke="#B8CAD3" filter="url(#softShadow)"/>
  <text x="1544" y="696" class="nodeTitle">Persist Metadata</text>
  <text x="1544" y="718" class="nodeText">Write status and tags.</text>

  <rect x="1720" y="654" width="136" height="98" rx="18" fill="#EAF0F2" stroke="#B8CAD3" filter="url(#softShadow)"/>
  <text x="1744" y="696" class="nodeTitle">Draft Report</text>
  <text x="1744" y="718" class="nodeText">Prepare artifact.</text>

  <rect x="1522" y="804" width="334" height="92" rx="18" fill="#FFFDF9" stroke="#B8CAD3" filter="url(#softShadow)"/>
  <text x="1544" y="844" class="nodeTitle">Persisted Result And Audit</text>
  <text x="1544" y="866" class="nodeText">Ship objects and review traces are updated.</text>

  <path d="M346 404H438" stroke="#264653" stroke-width="3" stroke-linecap="round" marker-end="url(#inkArrow)"/>
  <path d="M346 544H404V856H578" stroke="#264653" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#inkArrow)"/>
  <path d="M346 697H438" stroke="#B85C38" stroke-width="3.4" stroke-linecap="round" marker-end="url(#warmArrow)"/>

  <path d="M620 389H690" stroke="#264653" stroke-width="3" stroke-linecap="round" marker-end="url(#inkArrow)"/>
  <path d="M781 438V468H554V500" stroke="#264653" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#inkArrow)"/>
  <path d="M781 438V468H816V500" stroke="#264653" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#inkArrow)"/>
  <path d="M654 558H708" stroke="#B85C38" stroke-width="3.4" stroke-linecap="round" marker-end="url(#warmArrow)"/>
  <path d="M816 616V650H687V684" stroke="#264653" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#inkArrow)"/>
  <path d="M687 796V830" stroke="#B85C38" stroke-width="3.4" stroke-linecap="round" marker-end="url(#warmArrow)"/>

  <path d="M796 878H1176" stroke="#264653" stroke-width="3" stroke-linecap="round" marker-end="url(#inkArrow)"/>
  <path d="M1330 404V476H1366V524" stroke="#264653" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#inkArrow)"/>
  <path d="M1434 572H1522" stroke="#B85C38" stroke-width="3.4" stroke-linecap="round" marker-end="url(#warmArrow)"/>

  <path d="M1690 389H1720V345" stroke="#264653" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#inkArrow)"/>
  <path d="M1690 389H1720V459" stroke="#264653" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#inkArrow)"/>
  <path d="M1690 389H1720V573" stroke="#264653" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#inkArrow)"/>
  <path d="M1788 384V624H1607V654" stroke="#264653" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#inkArrow)"/>
  <path d="M1788 752V804H1690" stroke="#264653" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#inkArrow)"/>
  <path d="M1607 752V804" stroke="#264653" stroke-width="2.8" stroke-linecap="round" marker-end="url(#inkArrow)"/>

  <text x="96" y="1028" class="section">Proof Surfaces</text>

  <rect x="96" y="1056" width="560" height="126" rx="18" fill="#FFFDF9" stroke="#D8CCBA"/>
  <text x="120" y="1090" class="noteTitle">Test Case</text>
  <text x="120" y="1118" class="noteText">Each scenario should define the triggering condition, the early context branch, the expected decision branch, and the human step.</text>

  <rect x="688" y="1056" width="560" height="126" rx="18" fill="#FFFDF9" stroke="#D8CCBA"/>
  <text x="712" y="1090" class="noteTitle">Trace</text>
  <text x="712" y="1118" class="noteText">Expose `plannedPath`, executed `path`, `nextPath`, and the decision payload so both the early branch and final branch are visible.</text>

  <rect x="1280" y="1056" width="624" height="126" rx="18" fill="#FFFDF9" stroke="#D8CCBA"/>
  <text x="1304" y="1090" class="noteTitle">Result</text>
  <text x="1304" y="1118" class="noteText">Show what FleetGraph found, what it proposed, whether a human approved or dismissed it, and what was persisted.</text>

  <path d="M687 926V1056" stroke="#B85C38" stroke-width="2.4" stroke-dasharray="10 10"/>
  <path d="M1366 866V1056" stroke="#B85C38" stroke-width="2.4" stroke-dasharray="10 10"/>
  <path d="M1690 896V1056" stroke="#B85C38" stroke-width="2.4" stroke-dasharray="10 10"/>

  <text x="512" y="960" class="tiny">Highlighted line = the run that actually executed.</text>
  <text x="1498" y="928" class="tiny">Human review is a real graph node, and the runtime now branches earlier during context resolution.</text>
</svg>
