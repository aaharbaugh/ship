  <g filter="url(#shadow)">
    <circle cx="185" cy="300" r="115" fill="#10231a" stroke="#22c55e" stroke-width="3"/>
    <text x="185" y="272" class="nodeTitle">Document Routes</text>
    <text x="185" y="290" class="nodeFile">routes/documents.ts</text>
    <text x="185" y="314" class="nodeBody">create / update / content</text>
    <text x="185" y="330" class="nodeBody">computeFleetGraphContentHash()</text>
    <text x="185" y="346" class="nodeBody">enqueueFleetGraphRun()</text>
  </g>

  <g filter="url(#shadow)">
