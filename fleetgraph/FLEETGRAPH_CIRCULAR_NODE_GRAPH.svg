    <text x="1100" y="864" class="nodeFile">payload.ts</text>
    <text x="1100" y="886" class="nodeBody">doc/edge counts + summaries</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="1100" cy="980" r="92" fill="#10231a" stroke="#22c55e" stroke-width="3"/>
