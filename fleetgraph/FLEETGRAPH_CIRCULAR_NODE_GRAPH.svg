  <!-- edge labels -->
  <text x="475" y="270" class="edgeLabel">queue flush</text>
  <text x="900" y="248" class="edgeLabel">client</text>
  <text x="900" y="370" class="edgeLabel">trace</text>
  <text x="900" y="492" class="edgeLabel">hash</text>
  <text x="900" y="610" class="edgeLabel">crawl</text>
