  <!-- footer -->
  <rect x="70" y="1315" width="1660" height="55" rx="18" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="100" y="1348" class="mini">Main spine: queue → execute → prepare → traverse → graph → payload → score → persist → insights. Right orbit: report drafting, publishing, feedback, review surfaces. Left orbit: entry points and queueing behavior.</text>
