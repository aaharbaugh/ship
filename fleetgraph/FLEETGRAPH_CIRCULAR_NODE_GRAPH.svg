<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1400" viewBox="0 0 1800 1400" role="img" aria-labelledby="title desc">
  <title id="title">FleetGraph Circular Node Graph</title>
  <desc id="desc">Detailed circular-node view of FleetGraph runtime functions and review branches.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
    <style>
      .title { font: 700 36px ui-sans-serif, system-ui, sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 17px ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; }
      .cluster { font: 700 13px ui-sans-serif, system-ui, sans-serif; fill: #cbd5e1; letter-spacing: 0.16em; text-transform: uppercase; }
      .nodeTitle { font: 700 15px ui-sans-serif, system-ui, sans-serif; fill: #f8fafc; text-anchor: middle; }
      .nodeFile { font: 700 10px ui-sans-serif, system-ui, sans-serif; fill: #bfdbfe; text-anchor: middle; }
      .nodeBody { font: 500 10px ui-sans-serif, system-ui, sans-serif; fill: #dbeafe; text-anchor: middle; }
      .edge { stroke: #7dd3fc; stroke-width: 3; fill: none; marker-end: url(#arrow); opacity: 0.92; }
      .edgeSoft { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); opacity: 0.72; }
      .edgeLabel { font: 600 11px ui-sans-serif, system-ui, sans-serif; fill: #bae6fd; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1800" height="1400" fill="url(#bg)"/>

  <text x="70" y="70" class="title">FleetGraph Circular Node Graph</text>
  <text x="70" y="102" class="subtitle">Detailed function-node map. Center spine is the runtime; side orbits are trigger sources and review/report branches.</text>

  <text x="185" y="160" class="cluster">Trigger Orbit</text>
  <text x="900" y="160" class="cluster">Runtime Spine</text>
  <text x="1480" y="160" class="cluster">Report + Review Orbit</text>

  <!-- edges first -->
  <path class="edge" d="M 300 300 C 430 300, 510 260, 640 260"/>
  <path class="edge" d="M 300 500 C 430 500, 510 380, 640 380"/>
  <path class="edge" d="M 300 700 C 430 700, 510 500, 640 500"/>
  <path class="edge" d="M 300 900 C 430 900, 510 620, 640 620"/>

  <path class="edge" d="M 760 260 C 900 260, 900 260, 1040 260"/>
  <path class="edge" d="M 1160 260 C 1300 260, 1300 300, 1440 300"/>
  <path class="edge" d="M 760 380 C 900 380, 900 380, 1040 380"/>
  <path class="edge" d="M 1160 380 C 1240 380, 1310 380, 1440 430"/>
  <path class="edge" d="M 760 500 C 900 500, 900 500, 1040 500"/>
  <path class="edge" d="M 1160 500 C 1260 500, 1320 520, 1440 560"/>
  <path class="edge" d="M 760 620 C 900 620, 900 620, 1040 620"/>
  <path class="edge" d="M 1160 620 C 1280 620, 1340 650, 1440 690"/>
  <path class="edge" d="M 760 740 C 900 740, 900 740, 1040 740"/>
  <path class="edge" d="M 760 860 C 900 860, 900 860, 1040 860"/>
  <path class="edge" d="M 760 980 C 900 980, 900 980, 1040 980"/>
  <path class="edge" d="M 760 1100 C 900 1100, 900 1100, 1040 1100"/>

  <path class="edgeSoft" d="M 1160 740 C 1290 740, 1335 780, 1440 820"/>
  <path class="edgeSoft" d="M 1160 860 C 1280 860, 1335 890, 1440 950"/>
  <path class="edgeSoft" d="M 1160 980 C 1280 980, 1335 1010, 1440 1080"/>
  <path class="edgeSoft" d="M 1160 1100 C 1280 1100, 1335 1130, 1440 1210"/>

