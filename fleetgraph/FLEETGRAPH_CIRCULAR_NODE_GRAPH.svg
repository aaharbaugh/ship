    <text x="700" y="380" class="nodeFile">execute.ts</text>
    <text x="700" y="402" class="nodeBody">executeFleetGraphTrigger()</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="700" cy="500" r="78" fill="#0f2233" stroke="#38bdf8" stroke-width="3"/>
    <text x="700" y="483" class="nodeTitle">prepareRun</text>
    <text x="700" y="500" class="nodeFile">runner.ts</text>
    <text x="700" y="522" class="nodeBody">prepareFleetGraphRun()</text>
