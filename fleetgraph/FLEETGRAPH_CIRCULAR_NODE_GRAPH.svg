    <text x="185" y="482" class="nodeFile">collaboration/index.ts</text>
    <text x="185" y="506" class="nodeBody">schedulePersist()</text>
    <text x="185" y="522" class="nodeBody">latest idle candidate capture</text>
    <text x="185" y="538" class="nodeBody">scheduleFleetGraphIdleCheckpoint()</text>
    <text x="185" y="554" class="nodeBody">Y.js no longer directly spams runs</text>
  </g>

  <g filter="url(#shadow)">
