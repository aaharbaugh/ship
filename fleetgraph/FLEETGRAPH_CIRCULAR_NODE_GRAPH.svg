    <text x="1100" y="970" class="nodeFile">reasoning.ts + index.ts</text>
    <text x="1100" y="994" class="nodeBody">wrapOpenAI()</text>
    <text x="1100" y="1010" class="nodeBody">LangSmith startup status</text>
    <text x="1100" y="1026" class="nodeBody">Invocation metadata</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="1100" cy="1100" r="78" fill="#0f2233" stroke="#38bdf8" stroke-width="3"/>
    <text x="1100" y="1087" class="nodeTitle">Insights API</text>
    <text x="1100" y="1104" class="nodeFile">routes/fleetgraph.ts</text>
    <text x="1100" y="1126" class="nodeBody">GET /documents/:id</text>
  </g>

