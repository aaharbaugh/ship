    <text x="185" y="690" class="nodeFile">routes/fleetgraph.ts</text>
    <text x="185" y="714" class="nodeBody">POST /nightly-scan</text>
    <text x="185" y="730" class="nodeBody">workspace-level sweep trigger</text>
    <text x="185" y="746" class="nodeBody">optional draft reports</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="185" cy="900" r="120" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
    <text x="185" y="864" class="nodeTitle">Trigger Queue</text>
    <text x="185" y="882" class="nodeFile">services/fleetgraph/triggers.ts</text>
    <text x="185" y="906" class="nodeBody">hash dedupe</text>
    <text x="185" y="922" class="nodeBody">workspace-balanced selection</text>
    <text x="185" y="938" class="nodeBody">4-minute flush</text>
    <text x="185" y="954" class="nodeBody">queue status feed</text>
  </g>

